<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Daksha Martial</title>
  <link rel="icon" href="images/logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="output.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <style>
    :root {
      --home-bg: #EFF6FF;
      /* Soft Blue-50 */
      --text-color: #0F172A;
    }

    [data-theme="dark"] {
      --home-bg: #0F172A;
      /* Deep Slate-900 */
      --text-color: #F8FAFC;
    }

    [data-theme="dark"] .card {
      background-color: #1E293B;
      /* Slate-800 */
      border-color: #334155;
    }

    [data-theme="dark"] .title {
      color: white;
    }

    /* Dark mode input styling */
    [data-theme="dark"] input {
      background-color: #334155;
      border-color: #475569;
      color: white;
    }

    [data-theme="dark"] input::placeholder {
      color: #94A3B8;
    }

    body {
      background: var(--home-bg);
      color: var(--text-color);
      transition: background-color 0.4s, color 0.4s;
    }

    @media(max-width:821px) {
      .card1 {
        display: none !important;
      }
    }
  </style>
</head>

<body class="font-sans">

  <nav class="card w-full bg-[#1E3A8A] shadow-md transition-colors duration-300 border-b border-transparent">
    <div class="max-w-4xl mx-auto px-6 flex items-center justify-between h-16">

      <h1 class="text-xl font-semibold text-white flex items-center">
        <a href="index.html">Daksha Martial</a>
      </h1>

      <div class="flex gap-4 text-xl">
        <button id="rtlToggle" class="title text-white  transition">⇄</button>
        <button id="theme-toggle" class="title text-white transition">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>

    </div>
  </nav>

  <div class="flex justify-center items-center min-h-screen  pt-8 mt-[-50px]">

    <div
      class="card lg:w-1/2 p-10 flex flex-col justify-center bg-white rounded-2xl shadow-xl transition-colors duration-300 m-2">

      <div class="max-w-md mx-auto w-full">

        <h2 class="title text-2xl font-semibold mb-2 text-center text-blue-600">
          Welcome Back
        </h2>

        <p class="title text-gray-500 dark:text-gray-400 mb-6 text-center">
          Login to access classes & updates
        </p>

        <form class="space-y-4">

          <input type="email" placeholder="Email Address"
            class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            required>

          <div class="relative">
            <input type="password" id="password" placeholder="Password"
              class="w-full p-3 rounded-lg border focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
              required>
            <button type="button" id="togglePassword"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-blue-600 focus:outline-none transition-colors">
              <i class="bi bi-eye"></i>
            </button>
          </div>

          <div class="flex items-center justify-between text-sm mt-2">
            <div class="flex items-center gap-2">
              <input type="checkbox" id="remember" class="accent-blue-600 w-4 h-4">
              <label for="remember" class="title">Remember me</label>
            </div>
            <a href="#" class="text-blue-600 font-semibold hover:underline">Forgot Password?</a>
          </div>

          <button
            class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold transition duration-300 hover:bg-white border border-blue-600 hover:text-blue-600 shadow-md hover:shadow-lg mt-4">
            Login
          </button>

        </form>

        <div class="my-6 flex items-center">
          <hr class="flex-grow border-gray-200 dark:border-gray-600">
          <span class="px-3 text-gray-400 text-sm">Or continue with</span>
          <hr class="flex-grow border-gray-200 dark:border-gray-600">
        </div>

        <div class="flex gap-4">

          <button type="button"
            class="flex-1 py-2.5 border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-blue-50  hover:text-blue-600 transition duration-300 title">
            <i class="bi bi-google text-lg"></i>
          </button>

          <button type="button"
            class="flex-1 py-2.5 border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-blue-50 hover:text-blue-600 transition duration-300 title">
            <i class="bi bi-facebook text-lg"></i>
          </button>

          <button type="button"
            class="flex-1 py-2.5 border border-gray-200 dark:border-gray-600 rounded-lg hover:bg-blue-50  hover:text-blue-600 transition duration-300 title">
            <i class="bi bi-apple text-lg"></i>
          </button>

        </div>

        <p class="mt-8 text-center text-sm title text-gray-600">
          Don't have an account?
          <a href="sign.html" class="text-blue-600 font-semibold hover:underline ml-1">
            Sign Up
          </a>
        </p>

      </div>
    </div>

  </div>

  <script>

    // RTL Toggle
    const rtlToggle = document.getElementById('rtlToggle');
    rtlToggle.onclick = () => {
      document.documentElement.dir =
        document.documentElement.dir === "rtl" ? "ltr" : "rtl";
    }

    // Theme Toggle
    const btn = document.getElementById("theme-toggle");
    const saved = localStorage.getItem("theme");

    if (saved) {
      document.documentElement.dataset.theme = saved;
      btn.innerHTML = saved === "dark"
        ? '<i class="bi bi-sun-fill"></i>'
        : '<i class="bi bi-moon-fill"></i>';
    }

    btn.onclick = () => {
      let theme = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
      document.documentElement.dataset.theme = theme;
      localStorage.setItem("theme", theme);
      btn.innerHTML = theme === "dark"
        ? '<i class="bi bi-sun-fill"></i>'
        : '<i class="bi bi-moon-fill"></i>';
    }

    // Password Toggle
    const togglePassword = document.getElementById('togglePassword');
    const password = document.getElementById('password');

    if (togglePassword && password) {
      togglePassword.onclick = () => {
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        const icon = togglePassword.querySelector('i');
        icon.classList.toggle('bi-eye');
        icon.classList.toggle('bi-eye-slash');
      }
    }

  </script>

</body>

</html>
